name: Automatizacion Scraper Tecnologico

on:
  schedule:
    # Corre todos los días a las 5:00 AM UTC (12:00 AM hora Perú)
    - cron: '0 5 * * *'
  workflow_dispatch: # Te permite ejecutarlo manualmente desde la web de GitHub si quieres probar

jobs:
  ejecutar-scraper:
    runs-on: ubuntu-latest

    steps:
    - name: Descargar codigo del repositorio
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/checkout@v4
      with:
        python-version: '3.11'

    - name: Instalar dependencias
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Ejecutar Script ETL
      env:
        # Mapeamos de forma segura tus credenciales de AWS desde los Secrets de GitHub
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
        DB_PORT: ${{ secrets.DB_PORT }}
      run: python main.py